<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LoadPR — Weightlifting PR Tracker</title>
  <meta name="description" content="LoadPR is a minimalist weightlifting PR tracker with a percentage calculator, visual plate calculator, progress charts, and EMOM/HIIT/AMRAP timers.">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 17px;
      line-height: 1.6;
      color: #1a1a1a;
      background: #ffffff;
      margin: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 96px 24px 64px;
      text-align: center;
    }
    .mark {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #007aff;
      margin: 0 0 16px;
    }
    h1 {
      font-size: 40px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin: 0 0 16px;
    }
    .tagline {
      font-size: 20px;
      color: #3a3a3c;
      margin: 0 0 12px;
    }
    .features {
      color: #6e6e73;
      font-size: 16px;
      margin: 0 0 40px;
    }
    .links {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .links a {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid #d2d2d7;
      color: #007aff;
      background: #f5f5f7;
    }
    .links a:hover, .links a:focus { background: #ececef; }
    footer {
      margin-top: 56px;
      color: #aeaeb2;
      font-size: 14px;
    }
    @media (prefers-color-scheme: dark) {
      body { color: #f5f5f7; background: #000000; }
      .tagline { color: #d1d1d6; }
      .features, footer { color: #8e8e93; }
      .links a { background: #1c1c1e; border-color: #38383a; color: #0a84ff; }
      .links a:hover, .links a:focus { background: #2c2c2e; }
      .mark, h1 a { color: #0a84ff; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <p class="mark">LoadPR</p>
    <h1>Your lifts, tracked.</h1>
    <p class="tagline">A minimalist weightlifting PR tracker for iPhone.</p>
    <p class="features">Percentage calculator · visual plate calculator · progress charts · EMOM / HIIT / AMRAP timers.</p>
    <nav class="links">
      <a href="/privacy/">Privacy Policy</a>
      <a href="/terms/">Terms of Service</a>
    </nav>
    <footer>© 2026 LoadPR · support@loadpr.com</footer>
  </main>
</body>
</html>
